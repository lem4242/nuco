name: Mirror to public

# The private master force-pushes main + tags to the PUBLIC mirror
# (lem4242/nuco), which is read-only: never commit there directly.
#
# Auth: a deploy key. The public repo holds the public key (with write access);
# the master holds the private key as the MIRROR_DEPLOY_KEY secret.
# A deploy key (SSH) — not a PAT — is used so pushes that touch
# .github/workflows/ aren't rejected for lacking the `workflow` token scope.

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:

concurrency:
  group: mirror-to-public
  cancel-in-progress: false

jobs:
  mirror:
    # Guard: this file is itself mirrored into the public copy, so gate on the
    # repo being private — the job is inert wherever it lands publicly. (Named
    # nothing private, so the guard leaks nothing when mirrored.)
    if: ${{ github.event.repository.private == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Fail the mirror if any tracked file names the private master — it would
      # be published verbatim to the public repo. Reference the public repo or
      # nothing. (The pattern below uses [-] so this step never matches itself.)
      - name: Guard — no private-master reference leaks into the mirror
        run: |
          if git grep -nE 'lem4242/nuco[-]private' -- .; then
            echo "::error::A reference to the private master is present in tracked content and would be published to the public mirror. Reference the public repo (lem4242/nuco) or nothing."
            exit 1
          fi

      - name: Configure deploy key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.MIRROR_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

      - name: Push main + tags to public mirror
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes
        run: |
          git push --force git@github.com:lem4242/nuco.git HEAD:refs/heads/main
          git push --force --tags git@github.com:lem4242/nuco.git
